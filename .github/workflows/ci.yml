name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum needed token scope at workflow level; per-job overrides below.
permissions:
  contents: read

jobs:
  unit:
    name: Unit tests (Node)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/package-lock.json
      - run: npm ci
        working-directory: tests
      - run: npm run test:unit
        working-directory: tests

  coverage:
    name: Unit test coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/package-lock.json
      - run: npm ci
        working-directory: tests
      - name: Run coverage
        working-directory: tests
        run: npm run test:coverage
      - name: Upload to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: tests/coverage/lcov.info
          fail_ci_if_error: false
          flags: unit
          name: codecov-unit
          # CODECOV_TOKEN secret needed for private repos only;
          # public repos upload anonymously.

  npm-audit:
    name: npm audit (extension deps)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
      - run: npm ci
      - name: Audit (high+ severity fails)
        run: npm audit --audit-level=high

  validate-manifest:
    name: Validate manifest.json
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: JSON syntax
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"
      - name: Required fields
        run: |
          node -e "
            const m = JSON.parse(require('fs').readFileSync('manifest.json','utf8'));
            const required = ['manifest_version', 'name', 'version', 'description', 'permissions', 'content_scripts'];
            for (const k of required) if (m[k] == null) { console.error('missing:', k); process.exit(1); }
            if (m.manifest_version !== 3) { console.error('must be MV3'); process.exit(1); }
            console.log('manifest OK @ v' + m.version);
          "
